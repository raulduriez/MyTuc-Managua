
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTuc | Panel Conductor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg-dark: #070b12; --accent: #ff3d00; --azul-deep: #004e92; }
        body { background: radial-gradient(circle at center, var(--azul-deep), var(--bg-dark)) !important; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #panelTransmision { display: none; width: 90%; max-width: 400px; background: rgba(10,14,20,0.95); border-radius: 30px; padding: 30px; border: 1px solid var(--accent); text-align: center; }
        .btn-transmitir { background: var(--accent); color: white; font-weight: bold; border: none; border-radius: 15px; padding: 15px; width: 100%; transition: 0.3s; }
        .active-pulse { animation: pulse 1.5s infinite; background: #2ecc71 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(46,204,113,0.7); } 100% { box-shadow: 0 0 0 15px rgba(46,204,113,0); } }
    </style>
</head>
<body>
    <div id="portalConductor" onclick="abrirPortal()">
        <img src="img/Logo.jpeg" style="width:180px; border-radius:50%; border:2px solid orange;" alt="Logo">
        <h2 class="mt-3">PANEL CONDUCTOR</h2>
    </div>

    <div id="panelTransmision">
        <h3>Transmisión GPS</h3>
        <div class="alert alert-dark"><b id="statusText" class="text-warning">Inactivo</b><br><small id="coordsText">0, 0</small></div>
        <input type="hidden" id="busId">
        <button id="btnGps" class="btn-transmitir" onclick="toggleTransmision()">INICIAR RUTA</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDGBkCnWppaprzs2gUkTj16nk6WOiLn5yQ", databaseURL: "https://bus-tracker-managua-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // CAPTURA AUTOMÁTICA DEL ID DESDE EL QR[cite: 3, 4]
        const params = new URLSearchParams(window.location.search);
        const idQR = params.get('id');
        if(idQR) { document.getElementById('busId').value = idQR; }

        function abrirPortal() { 
            if(!idQR) alert("Por favor escanee el código QR oficial.");
            else { document.getElementById('portalConductor').style.display='none'; document.getElementById('panelTransmision').style.display='block'; }
        }

        let watchId = null, activo = false;
        function toggleTransmision() {
            const id = document.getElementById('busId').value;
            const btn = document.getElementById('btnGps');
            if(!activo) {
                activo = true; btn.classList.add('active-pulse'); btn.innerText = "DETENER";
                watchId = navigator.geolocation.watchPosition(pos => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    document.getElementById('coordsText').innerText = lat.toFixed(4) + ", " + lng.toFixed(4);
                    db.ref(`buses/${id}`).set({ lat, lng, timestamp: Date.now() });
                }, null, { enableHighAccuracy: true });
            } else {
                activo = false; btn.classList.remove('active-pulse'); btn.innerText = "INICIAR";
                navigator.geolocation.clearWatch(watchId);
                db.ref(`buses/${id}`).remove();
            }
        }
    </script>
</body>
</html>
