<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conductor | MyTuc Managua</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #001f3f, #001122);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        .estado {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-bus"></i> Panel Conductor</h1>
        <div class="estado" id="estadoDiv">
            <i class="fas fa-circle" style="color: #1e8e3e;"></i> Conectando...
        </div>
        <button onclick="enviarUbicacion()">
            <i class="fas fa-location-dot"></i> Enviar Ubicación
        </button>
        <button onclick="iniciarEnvioAutomatico()" style="background: #f39c12;">
            <i class="fas fa-clock"></i> Envío Automático (c/5s)
        </button>
        <p style="font-size: 12px; text-align: center; margin-top: 30px;">
            Unidad: <span id="unidadId">Cargando...</span>
        </p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGBkCnWppaprzs2gUkTj16nk6WOiLn5yQ",
            databaseURL: "https://bus-tracker-managua-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let unidadID = null;
        let intervalo = null;

        // Obtener ID de la URL
        const params = new URLSearchParams(window.location.search);
        unidadID = params.get('id');

        document.getElementById('unidadId').innerText = unidadID || 'No ID';

        function enviarUbicacion() {
            if (!unidadID) {
                alert("Error: No se encontró ID de unidad");
                return;
            }

            if (!navigator.geolocation) {
                alert("Geolocalización no soportada");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const ubicacion = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        timestamp: Date.now(),
                        unidad: unidadID
                    };

                    db.ref('buses/' + unidadID).set(ubicacion)
                        .then(() => {
                            document.getElementById('estadoDiv').innerHTML = 
                                '<i class="fas fa-check-circle" style="color:#1e8e3e"></i> Ubicación enviada: ' +
                                ubicacion.lat.toFixed(4) + ', ' + ubicacion.lng.toFixed(4);
                        })
                        .catch(error => {
                            document.getElementById('estadoDiv').innerHTML = 
                                '<i class="fas fa-exclamation-triangle" style="color:#d93025"></i> Error: ' + error.message;
                        });
                },
                (error) => {
                    alert("Error GPS: " + error.message);
                }
            );
        }

        function iniciarEnvioAutomatico() {
            if (intervalo) {
                clearInterval(intervalo);
                intervalo = null;
                alert("Envío automático DETENIDO");
            } else {
                enviarUbicacion(); // Enviar inmediatamente
                intervalo = setInterval(enviarUbicacion, 5000);
                alert("Envío automático ACTIVADO (cada 5 segundos)");
            }
        }
    </script>
</body>
</html>
