<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTN | Admin Maestro MyTuc</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --success: #1e8e3e; --warning: #f39c12; --border: #dadce0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: grid; grid-template-columns: 380px 1fr; grid-template-rows: 75px 1fr; height: 100vh; background: #f1f3f4; }
        header { grid-column: 1 / -1; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 25px; justify-content: space-between; z-index: 1001; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { height: 55px; border-radius: 8px; }
        #clock { font-family: monospace; font-size: 1.3rem; font-weight: bold; background: #e8f0fe; padding: 8px 20px; border-radius: 25px; color: var(--primary); }
        .sidebar { background: #fff; border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-success { background: var(--success); color: white; }
        .btn-main { background: var(--primary); color: white; }
        .scroll-list { max-height: 200px; overflow-y: auto; font-size: 12px; }
        .list-item { padding: 12px; border-bottom: 1px solid #f1f1f1; }
        .tag { padding: 4px 8px; border-radius: 6px; font-size: 9px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #map { height: 100%; width: 100%; }
        .qr-thumb { height: 50px; width: 50px; border: 1px solid #eee; cursor: pointer; border-radius: 5px; }
        #access-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f1f3f4; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .access-card { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 320px; border-top: 5px solid var(--primary); }
    </style>
</head>
<body>
    <div id="access-overlay">
        <div class="access-card">
            <img src="img/Logo.jpeg" style="height:70px; margin-bottom:15px; border-radius:10px;">
            <h2>Panel Maestro</h2>
            <input type="password" id="access-code" placeholder="CÓDIGO" style="width:100%; padding:12px; margin:20px 0; border:1px solid #ccc; text-align:center;">
            <button class="btn btn-main" onclick="checkAccess()">INGRESAR</button>
        </div>
    </div>
    <header>
        <div class="logo-area"><img src="img/Logo.jpeg"><div><h2 style="margin:0; color:var(--primary);">MyTuc Admin</h2></div></div>
        <div id="clock">00:00:00</div>
    </header>
    <aside class="sidebar">
        <div class="card">
            <h3>Cooperativas</h3>
            <div id="listEmpresas" class="scroll-list"></div>
            <button class="btn btn-main" onclick="nuevaEmpresa()">Nueva Cooperativa</button>
        </div>
        <div class="card">
            <h3>Unidades y QR</h3>
            <div id="listConductores" class="scroll-list"></div>
            <button class="btn btn-success" onclick="registrarConductorAdmin()">Generar QR Unidad</button>
        </div>
        <div class="card"><h3>Reportes Chat</h3><div id="listAlertas" class="scroll-list"></div></div>
    </aside>
    <main><div id="map"></div></main>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDGBkCnWppaprzs2gUkTj16nk6WOiLn5yQ", databaseURL: "https://bus-tracker-managua-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkAccess() {
            const code = document.getElementById('access-code').value;
            if (code === "7070" || code === "2026") document.getElementById('access-overlay').style.display = "none";
            else alert("Acceso denegado");
        }

        const map = L.map('map', { zoomControl: false }).setView([12.1328, -86.2504], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const busIcon = L.divIcon({ html: '<i class="fas fa-bus" style="color:#1a73e8; font-size:20px;"></i>', className: 'b-icon', iconSize: [20, 20] });
        let markersBuses = {};

        db.ref('buses').on('value', snap => {
            snap.forEach(child => {
                const b = child.val();
                if(b.estado === 'activo') {
                    if(markersBuses[child.key]) markersBuses[child.key].setLatLng([b.lat, b.lng]);
                    else markersBuses[child.key] = L.marker([b.lat, b.lng], {icon: busIcon}).addTo(map).bindPopup("Unidad: " + child.key);
                }
            });
        });

        function nuevaEmpresa() {
            const nom = prompt("Nombre Cooperativa:");
            if(nom) db.ref('empresas/' + Date.now()).set({ nombre: nom, estado: 'activo' });
        }

        db.ref('empresas').on('value', snap => {
            const list = document.getElementById('listEmpresas');
            list.innerHTML = "";
            snap.forEach(child => {
                list.innerHTML += `<div class="list-item"><b>${child.val().nombre}</b> <button onclick="db.ref('empresas/${child.key}').remove()" class="tag" style="background:red">Borrar</button></div>`;
            });
        });

       function registrarConductorAdmin() {
    const unidad = prompt("Unidad:");
    const empresa = prompt("Cooperativa:");
    if(!unidad || !empresa) return;
    const cod = "EMP-" + Math.floor(1000 + Math.random()*9000);
    
    // ESTA LÓGICA ELIMINA EL ERROR DE "TU_USUARIO"
    // Toma la dirección actual (https://raulduriez.github.io/MyTuc-Managua/)
    const urlActual = window.location.href; 
    const urlCarpeta = urlActual.substring(0, urlActual.lastIndexOf('/'));
    
    // Une la dirección con el nombre del archivo del conductor y el ID
    const urlFinalConductor = urlCarpeta + "/conductor.html?id=" + cod;

    // Genera el QR con la dirección real detectada
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(urlFinalConductor)}`;

    db.ref('conductores_autorizados/' + cod).set({ 
        unidad, 
        empresa_nombre: empresa, 
        estado: 'validada', 
        qr: qrUrl 
    });
    
    window.open(qrUrl, '_blank');
}

        db.ref('conductores_autorizados').on('value', snap => {
            const list = document.getElementById('listConductores');
            list.innerHTML = "";
            snap.forEach(child => {
                const c = child.val(), id = child.key;
                list.innerHTML += `<div class="list-item">
                    <div style="display:flex; justify-content:space-between">
                        <b>Unidad ${c.unidad}</b>
                        <img src="${c.qr}" class="qr-thumb" onclick="window.open('${c.qr}')">
                    </div>
                    <div style="display:flex; gap:3px; margin-top:5px;">
                        <span class="tag" style="background:${c.estado==='validada'?'green':'#ccc'}" onclick="db.ref('conductores_autorizados/${id}').update({estado:'validada'})">Validar</span>
                        <span class="tag" style="background:${c.estado==='pausada'?'orange':'#ccc'}" onclick="db.ref('conductores_autorizados/${id}').update({estado:'pausada'})">Pausar</span>
                        <span class="tag" style="background:${c.estado==='bloqueada'?'red':'#ccc'}" onclick="db.ref('conductores_autorizados/${id}').update({estado:'bloqueada'})">Bloquear</span>
                        <button onclick="db.ref('conductores_autorizados/${id}').remove()" style="border:none; background:none;">🗑️</button>
                    </div>
                </div>`;
            });
        });

        db.ref('chat_comunidad').on('child_added', snap => {
            const m = snap.val();
            const div = document.createElement('div');
            div.className = "list-item";
            div.innerHTML = `<small><b>${m.telefono || 'Anon'}</b></small><br>${m.mensaje}`;
            document.getElementById('listAlertas').prepend(div);
        });

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
