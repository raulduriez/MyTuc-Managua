<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Operaciones MyTuc</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #00a8e8; --text: #c9d1d9; --success: #00ff88; --danger: #ff4444; --warning: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--card); padding: 10px 25px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; z-index: 1001; }
        header h1 { color: var(--accent); font-size: 1.1rem; margin: 0; }

        /* Ajuste de Altura: Mapa más alto, tabla más baja */
        .main-layout { display: grid; grid-template-columns: 1fr 220px; grid-template-rows: 1fr 180px; flex: 1; overflow: hidden; }
        #map { grid-column: 1; grid-row: 1; width: 100%; border-bottom: 2px solid #30363d; }
        
        .sidebar-right { grid-column: 2; grid-row: 1 / 3; background: var(--card); border-left: 1px solid #30363d; padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .table-area { grid-column: 1; grid-row: 2; background: white; overflow-y: auto; padding: 5px; }

        .op-table { width: 100%; border-collapse: collapse; font-size: 0.6rem; color: #333; background: white; }
        .op-table th, .op-table td { border: 1px solid #ccc; padding: 4px; text-align: center; }
        .head-title { color: #1a73e8; font-weight: bold; background: #f0f0f0; position: sticky; top: 0; }

        /* Cuadro de Leyenda */
        .legend-box { background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 6px; padding: 8px; font-size: 0.65rem; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        .alerta-parado { background: #ff4444 !important; color: white !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }

        .adelantado { background: var(--danger) !important; color: white !important; font-weight: bold; }
        .retrasado { background: var(--warning) !important; color: black !important; font-weight: bold; }
        .puntual { background: var(--success) !important; color: black !important; font-weight: bold; }
        
        .stat-box { background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); text-align: center; }
        .stat-box h5 { margin: 0; font-size: 0.65rem; color: var(--accent); }
        .stat-box p { margin: 5px 0 0; font-size: 1.2rem; font-weight: bold; }

        .btn-excel { background: #1e8e3e; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; font-size: 0.7rem; }
        .bus-icon { background: var(--accent); border: 1px solid white; border-radius: 50%; color: white; text-align: center; font-weight: bold; font-size: 9px; line-height: 18px; }
        #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--accent); text-align: center; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-box">
        <img src="img/Logo.jpeg" style="height: 50px; border-radius: 10px; margin-bottom: 10px;">
        <h2 style="color:white;">Control de Operaciones</h2>
        <input type="text" id="passInput" placeholder="Código de Empresa" style="padding:10px; border-radius:5px; border:none; text-align:center;">
        <br><br>
        <button onclick="acceder()" style="background:var(--accent); color:white; border:none; padding:10px 25px; border-radius:8px; cursor:pointer; font-weight:bold;">INGRESAR</button>
    </div>
</div>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="img/Logo.jpeg" style="height:35px; border-radius:5px;">
        <h1>COTRACOSAN - RUTA 210</h1>
    </div>
    <div id="reloj" style="font-family:monospace; font-weight:bold; color:var(--accent); font-size: 1.1rem;">00:00:00</div>
</header>

<div class="main-layout">
    <div id="map"></div>

    <div class="sidebar-right">
        <div class="stat-box">
            <h5>UNIDADES ACTIVAS</h5>
            <p id="countBuses">0</p>
        </div>

        <!-- Cuadro de Simbología -->
        <div class="legend-box">
            <h5 style="color:var(--accent); margin-top:0;">SIMBOLOGÍA</h5>
            <div class="legend-item"><div class="dot" style="background:#00ff88;"></div> IDA (Marcación)</div>
            <div class="legend-item"><div class="dot" style="background:#ffcc00;"></div> VUELTA (Marcación)</div>
            <hr style="border:0; border-top:1px solid #333;">
            <div class="legend-item"><div class="dot" style="background:var(--success);"></div> Puntual</div>
            <div class="legend-item"><div class="dot" style="background:var(--danger);"></div> Adelantado</div>
            <div class="legend-item"><div class="dot" style="background:var(--warning);"></div> Retrasado</div>
            <div class="legend-item"><div class="dot" style="background:#ff4444;"></div> +5 min Detenido 🔊</div>
        </div>

        <button class="btn-excel" onclick="exportarExcel()">📥 EXCEL CICLO</button>
        
        <div style="margin-top:auto;">
            <label style="font-size:0.6rem;">AVISO A ADMINMASTER:</label>
            <textarea id="adminMsg" style="width:100%; height:40px; background:#000; color:white; border:1px solid #333; font-size:0.7rem; border-radius:4px;"></textarea>
            <button onclick="alert('Enviado')" style="width:100%; padding:5px; background:var(--accent); border:none; color:white; font-size:0.6rem; cursor:pointer; border-radius:4px; margin-top:5px;">ENVIAR</button>
        </div>
    </div>

    <div class="table-area">
        <table class="op-table" id="tablaReporte">
            <thead>
                <tr class="head-title">
                    <th rowspan="2">Fecha</th>
                    <th rowspan="2">Unidad</th>
                    <th colspan="4">IDA</th>
                    <th colspan="3">VUELTA</th>
                    <th rowspan="2">Dist.</th>
                    <th rowspan="2">ETA</th>
                </tr>
                <tr class="head-title">
                    <th>17</th><th>24</th><th>31</th><th>48</th><th>54</th><th>66</th><th>76</th>
                </tr>
            </thead>
            <tbody id="monitorGrid"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDGBkCnWppaprzs2gUkTj16nk6WOiLn5yQ",
        databaseURL: "https://bus-tracker-managua-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const map = L.map('map').setView([12.14, -86.31], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { opacity: 0.4 }).addTo(map);

    let marcadoresBuses = {};
    let marcacionesCerradas = {};
    let historialPos = {};

    const PARADAS = {
        "17": {lat: 12.165573, lng: -86.3570861, prog: 5}, 
        "24": {lat: 12.1682998, lng: -86.3435461, prog: 15},
        "31": {lat: 12.1322098, lng: -86.3138018, prog: 25}, 
        "48": {lat: 12.1257577, lng: -86.2727351, prog: 30},
        "54": {lat: 12.1268021, lng: -86.2715981, prog: 40},
        "66": {lat: 12.1296126, lng: -86.2954226, prog: 50},
        "76": {lat: 12.1688275, lng: -86.3426136, prog: 60}
    };

    // Dibujar puntos en mapa[cite: 1]
    for(let p in PARADAS) {
        L.circleMarker([PARADAS[p].lat, PARADAS[p].lng], {
            radius: 5, color: p <= "48" ? '#00ff88' : '#ffcc00', fillOpacity: 0.8
        }).addTo(map);
    }

    // Audio de alerta (Beep)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function sonarAlerta() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    function acceder() {
        const cod = document.getElementById('passInput').value.trim();
        db.ref('empresas/' + cod).once('value', snap => {
            if(snap.exists()) document.getElementById('authOverlay').style.display = 'none';
            else alert("ACCESO DENEGADO");
        });
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
        const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    db.ref('buses').on('value', snap => {
        const data = snap.val();
        const grid = document.getElementById('monitorGrid');
        const ahora = Date.now();
        grid.innerHTML = "";

        if(!data) return;
        let activos = Object.keys(data).map(id => ({id, ...data[id]}))
            .filter(b => (ahora - b.ultima_actualizacion) < 120000);

        document.getElementById('countBuses').innerText = activos.length;

        activos.forEach((bus, i) => {
            const num = bus.id.split('-')[1] || bus.id;
            const horaIniRaw = bus.ultima_actualizacion;
            
            // Lógica de detección de bus detenido[cite: 1]
            if(!historialPos[bus.id]) historialPos[bus.id] = {lat: bus.lat, lng: bus.lng, t: ahora};
            if(getDist(bus.lat, bus.lng, historialPos[bus.id].lat, historialPos[bus.id].lng) > 8) {
                historialPos[bus.id] = {lat: bus.lat, lng: bus.lng, t: ahora};
            }
            let minutosParado = Math.floor((ahora - historialPos[bus.id].t) / 60000);

            if(minutosParado >= 5) sonarAlerta();

            let celdasHTML = "";
            ["17","24","31","48","54","66","76"].forEach(p => {
                const dist = getDist(bus.lat, bus.lng, PARADAS[p].lat, PARADAS[p].lng);
                if(dist <= 50 && !marcacionesCerradas[bus.id]?.[p]) {
                    if(!marcacionesCerradas[bus.id]) marcacionesCerradas[bus.id] = {};
                    marcacionesCerradas[bus.id][p] = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                }
                let valor = marcacionesCerradas[bus.id]?.[p] || '-';
                let clase = "";
                if(valor !== '-') {
                    let minTrans = Math.floor((ahora - horaIniRaw) / 60000);
                    if(minTrans < PARADAS[p].prog - 3) clase = "adelantado";
                    else if(minTrans > PARADAS[p].prog + 7) clase = "retrasado";
                    else clase = "puntual";
                }
                celdasHTML += `<td class="${clase}">${valor}</td>`;
            });

            grid.innerHTML += `
                <tr class="${minutosParado >= 5 ? 'alerta-parado' : ''}">
                    <td>${new Date().toLocaleDateString()}</td>
                    <td style="font-weight:bold; background:#eee; color:#000;">${num}</td>
                    ${celdasHTML}
                    <td>---</td>
                    <td style="color:var(--accent); font-weight:bold;">${minutosParado}m det.</td>
                </tr>`;

            if(marcadoresBuses[bus.id]) {
                marcadoresBuses[bus.id].setLatLng([bus.lat, bus.lng]);
            } else {
                marcadoresBuses[bus.id] = L.marker([bus.lat, bus.lng], {
                    icon: L.divIcon({className:'bus-icon', html:num, iconSize:[20,20]})
                }).addTo(map);
            }
        });
    });

    function exportarExcel() {
        XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tablaReporte")), "Reporte_210.xlsx");
    }
    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
