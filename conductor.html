<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTuc | Acceso Usuarios</title>
    <style>
        :root {
            --bg-dark: #070b12;
            --accent: #00e5ff; /* Cian espacial */
            --glow: #7000ff;   /* Púrpura neón */
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-dark);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Contenedor del Logo con Giro Espacial */
        .portal-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* El círculo con efecto de colores recorriendo el borde */
        .space-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--accent), var(--glow), transparent);
            animation: spin 1.5s linear infinite;
            filter: drop-shadow(0 0 15px var(--accent));
        }

        .space-ring::after {
            content: '';
            position: absolute;
            inset: 6px;
            background: var(--bg-dark);
            border-radius: 50%;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Logo Central */
        .logo-central {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            z-index: 10;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* Modal de Entrada */
        .access-card {
            display: none;
            position: fixed;
            background: #111827;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--accent);
            text-align: center;
            width: 85%;
            max-width: 340px;
            z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .access-card h2 { color: white; margin-top: 0; font-size: 1.3rem; }
        
        .input-group {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            margin: 20px 0;
            border: 1px solid #333;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: var(--accent);
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            outline: none;
        }

        .btn-enter {
            background: var(--accent);
            color: #000;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 90;
        }
    </style>
</head>
<body>

    <div class="portal-container" onclick="abrirPortal()">
        <div class="space-ring"></div>
        <img src="img/Logo.jpeg" class="logo-central" alt="Logo MyTuc">
    </div>

    <div id="overlay"></div>

    <div id="modalAcceso" class="access-card">
        <h2>IDENTIFICACIÓN</h2>
        <p style="color: #9ca3af; font-size: 0.9rem;">Ingrese su número para rastrear su ruta en tiempo real.</p>
        
        <div class="input-group">
            <input type="tel" id="userPhone" placeholder="8888-8888" maxlength="8">
        </div>

        <button class="btn-enter" onclick="concederAcceso()">
            <i class="fas fa-location-arrow"></i> ACTIVAR RADAR
        </button>
    </div>

    <script>
        function abrirPortal() {
            document.getElementById('modalAcceso').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function concederAcceso() {
            const tel = document.getElementById('userPhone').value;
            if(tel.length >= 8) {
                // Guardamos el teléfono para que el radar lo lea automáticamente
                localStorage.setItem('myBus_phone', tel);
                // Redirigimos a la página del mapa[cite: 3]
                window.location.href = "radar.html?start=true";
            } else {
                alert("Por favor, ingrese un número válido.");
            }
        }
    </script>
</body>
</html>
