<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Conductor | MyTuc</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('img/Logo.jpeg'); background-size: 60px; opacity: 0.1; z-index: -1; }
        .container { width: 90%; max-width: 400px; background: rgba(22, 27, 34, 0.9); padding: 30px; border-radius: 20px; border: 1px solid #30363d; text-align: center; backdrop-filter: blur(10px); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-start { background: #1a73e8; color: white; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.4); }
        .btn-stop { background: #d93025; color: white; display: none; }
        #extraInfo { display: none; margin-top: 20px; text-align: left; }
        .status-badge { background: #1a73e8; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; display: inline-block; width: 100%; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <img src="img/Logo.jpeg" style="height:60px; border-radius:10px; margin-bottom:15px;">
    <h2>Panel Conductor</h2>
    
    <div id="step1">
        <input type="text" id="unidadCodigo" placeholder="Esperando QR o ingrese código...">
        <button class="btn btn-start" onclick="validarCodigo()">VERIFICAR UNIDAD</button>
    </div>

    <div id="extraInfo">
        <div class="status-badge" id="labelUnidad">UNIDAD NO DETECTADA</div>
        <label style="font-size: 12px; color: #8b949e;">TELÉFONO:</label>
        <input type="tel" id="telConductor" placeholder="Ej: 88888888">
        <label style="font-size: 12px; color: #8b949e;">RUTA:</label>
        <input type="text" id="rutaNombre" placeholder="Ej: Ruta 110">
        <button class="btn btn-start" onclick="iniciarGPS()">ACTIVAR RASTREO EN VIVO</button>
    </div>

    <button id="stopBtn" class="btn btn-stop" onclick="detenerGPS()">DETENER TRANSMISIÓN</button>
    <p id="statusMsg" style="margin-top:20px; font-size: 14px;"></p>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDGBkCnWppaprzs2gUkTj16nk6WOiLn5yQ", databaseURL: "https://bus-tracker-managua-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let watchId = null, unidadIdGlobal = null, codigoGlobal = null;

    // DETECCIÓN AUTOMÁTICA DE QR
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const idQR = urlParams.get('id');
        if (idQR) {
            document.getElementById('unidadCodigo').value = idQR;
            validarCodigo();
        }
    };

    function validarCodigo() {
        const cod = document.getElementById('unidadCodigo').value.trim();
        db.ref(`conductores_autorizados/${cod}`).once('value', snap => {
            const d = snap.val();
            if(d && d.estado === 'activo') {
                codigoGlobal = cod; unidadIdGlobal = d.unidad;
                document.getElementById('step1').style.display = 'none';
                document.getElementById('extraInfo').style.display = 'block';
                document.getElementById('labelUnidad').innerText = "UNIDAD #" + d.unidad + " - " + d.empresa_nombre;
            } else { alert("Código inválido o bloqueado."); }
        });
    }

    function iniciarGPS() {
        const tel = document.getElementById('telConductor').value;
        const rut = document.getElementById('rutaNombre').value;
        if(!tel || !rut) return alert("Faltan datos");

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(() => {
                document.getElementById('extraInfo').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('statusMsg').innerHTML = "🛰️ <span style='color:#00ff88'>TRANSMITIENDO POSICIÓN GPS</span>";
                
                watchId = navigator.geolocation.watchPosition(pos => {
                    db.ref(`buses/${unidadIdGlobal}`).update({
                        lat: pos.coords.latitude, lng: pos.coords.longitude,
                        ruta: rut, telefono: tel, estado: 'activo', ultima_actualizacion: Date.now()
                    });
                }, null, { enableHighAccuracy: true });
            }, () => alert("Por favor active el GPS de su celular."));
        }
    }

    function detenerGPS() {
        if(watchId) navigator.geolocation.clearWatch(watchId);
        db.ref(`buses/${unidadIdGlobal}`).update({ estado: 'inactivo' });
        location.reload();
    }
</script>
</body>
</html>
