<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBus - Panel de Control</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.2/dist/leaflet-search.min.css" />
    
    <style>
        :root {
            --azul-oscuro: #000428;
            --azul-deep: #004e92;
            --celeste: #00A8E8;
            --verde-neon: #2ECC71;
            --blanco-puro: #ffffff;
            --gris-claro: #f8f9fa;
        }

        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: var(--gris-claro); display: flex; flex-direction: column; height: 100vh; 
        }

        /* HEADER SEGÚN BOCETO */
        header { 
            background: var(--azul-oscuro); color: white; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--celeste);
        }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR IZQUIERDO */
        .sidebar { 
            width: 320px; background: var(--blanco-puro); border-right: 1px solid #ddd;
            display: flex; flex-direction: column; padding: 15px; gap: 15px;
        }

        .btn-accion { 
            background: var(--azul-deep); color: white; border: none; padding: 12px;
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem;
        }

        .btn-accion.activo { background: var(--verde-neon); color: var(--azul-oscuro); }

        .search-box-container { 
            border: 2px solid var(--celeste); padding: 5px; border-radius: 6px;
        }

        /* PANEL DE DATOS CERCANOS */
        .datos-cerca { background: #eef7ff; padding: 10px; border-radius: 6px; border-left: 4px solid var(--celeste); }
        .datos-cerca h4 { margin: 0 0 5px 0; font-size: 0.85rem; }

        /* AREA CENTRAL: MAPA */
        #map { flex: 1; position: relative; }

        /* FOOTER DE INFORMACIÓN (CLIMA/ACCIDENTES) */
        .info-footer { 
            background: var(--azul-oscuro); color: white; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.9rem;
        }

        /* BARRA INFERIOR DE MENSAJES Y WHATSAPP */
        .bottom-bar { 
            background: var(--blanco-puro); border-top: 1px solid #ddd; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .whatsapp-link { color: #25d366; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 5px; }

        /* Estilo para los inputs */
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <img src="img/logo2.jpeg" alt="Logo" style="height: 40px; border-radius: 4px;">
    <div>Usuario: <span id="display-phone">--------</span></div>
</header>

<div class="main-container">
    <aside class="sidebar">
        <!-- Bloque de Registro según boceto -->
        <div id="registro-seccion">
            <label>Número de teléfono</label>
            <input type="tel" id="user-phone" placeholder="Ingresa tu número">
            <button class="btn-accion" style="margin-top:10px; width:100%" onclick="activarUsuario()">GPS ACTIVAR</button>
        </div>

        <button class="btn-accion" id="btn-auto">Botón Activación Automática</button>
        
        <div class="search-box-container">
            <label style="font-size: 0.75rem; font-weight: bold;">BUSCAR PARADA (ESCRIBIR)</label>
            <div id="search-control-here"></div>
        </div>

        <!-- Lista de tiempos según boceto -->
        <div class="datos-cerca">
            <h4>DATOS CERCANOS</h4>
            <div id="bus-list">
                <p>BUS 1: -- MINUTOS</p>
                <p>BUS 2: -- MINUTOS</p>
                <p>PARADA: XXX</p>
            </div>
        </div>
    </aside>

    <main id="map"></main>
</div>

<!-- Sección de información adicional del boceto -->
<div class="info-footer">
    <div id="weather-info">🌤️ Cargando Clima... 28°C</div>
    <div id="accident-info">⚠️ Sin accidentes en ruta</div>
</div>

<div class="bottom-bar">
    <div id="instant-msg" style="color: var(--azul-deep); font-weight: bold;">MENSAJES INSTANTÁNEOS: Bienvenidos a MyBus</div>
    <a href="https://wa.me/505xxxxxxxx" class="whatsapp-link">
        Contacto WhatsApp 💬
    </a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.2/dist/leaflet-search.min.js"></script>

<!-- Carga de tu base de datos de paradas de Managua -->
<script src="PUNTOS_MANAGUA_01052026_1.js"></script>

<script>
    var map = L.map('map').setView([12.1328, -86.2504], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var userMarker;
    var paradasLayer;

    // Función para activar el usuario según tu boceto
    function activarUsuario() {
        var phone = document.getElementById('user-phone').value;
        if(phone.length < 8) {
            alert("Por favor ingresa un número válido");
            return;
        }
        document.getElementById('display-phone').innerText = phone;
        obtenerUbicacionReal();
    }

    function obtenerUbicacionReal() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                if (userMarker) map.removeLayer(userMarker);
                
                // Icono azul para el usuario
                userMarker = L.circleMarker([latitude, longitude], {
                    radius: 10, color: '#004e92', fillColor: '#00A8E8', fillOpacity: 1
                }).addTo(map).bindPopup("Tu Ubicación Actual").openPopup();
                
                map.setView([latitude, longitude], 16);
                document.getElementById('btn-auto').classList.add('activo');
                calcularTiemposSimulados();
            });
        }
    }

    // Capa de Paradas vinculada al buscador
    paradasLayer = L.geoJSON(PUNTOS_MANAGUA_01052026_1, {
        onEachFeature: function(feature, layer) {
            layer.bindPopup("<b>Parada:</b> " + feature.properties.name);
        }
    }).addTo(map);

    // Configuración del buscador para que dejes ESCRIBIR (como pediste en el boceto)
    var searchControl = new L.Control.Search({
        container: 'search-control-here',
        layer: paradasLayer,
        propertyName: 'name',
        marker: false,
        textPlaceholder: 'Escribe el nombre...',
        moveToLocation: function(latlng, title, map) {
            map.setView(latlng, 17);
            document.getElementById('instant-msg').innerText = "CONSULTANDO: " + title;
        }
    });
    map.addControl(searchControl);

    function calcularTiemposSimulados() {
        // Aquí conectaremos con tu Firebase en el siguiente paso para ver buses reales
        document.getElementById('bus-list').innerHTML = `
            <p style="color: var(--azul-deep); font-weight:bold;">BUS 1: 3 MINUTOS</p>
            <p style="color: var(--azul-deep); font-weight:bold;">BUS 2: 8 MINUTOS</p>
            <p>PARADA MÁS CERCANA: En rango (1km)</p>
        `;
    }
</script>

</body>
</html>
