<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBus - Sistema de Triangulación</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.2/dist/leaflet-search.min.css" />
    
    <style>
        :root {
            --azul-oscuro: #000428;
            --azul-deep: #004e92;
            --celeste: #00A8E8;
            --verde-neon: #2ECC71;
            --rojo-norte: #FF0000;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }

        /* CUADRO DE DIALOGO INICIAL (REQUISITOS) */
        #modal-registro {
            position: fixed; inset: 0; background: rgba(0,4,40,0.9);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .form-registro {
            background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center;
            border-top: 5px solid var(--celeste);
        }

        /* PANEL LATERAL DE CONTROL */
        .sidebar { width: 350px; background: white; display: flex; flex-direction: column; border-right: 1px solid #ccc; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; }

        .section-box { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        h3 { font-size: 0.9rem; margin: 0 0 10px 0; color: var(--azul-oscuro); text-transform: uppercase; }

        /* BOTONES */
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        .btn-auto { background: var(--azul-deep); color: white; }
        .btn-auto:hover { background: var(--celeste); }

        /* ICONOS PERSONALIZADOS */
        .stop-icon-label {
            background: white; border: 2px solid var(--azul-deep); border-radius: 50%;
            text-align: center; font-weight: bold; font-size: 10px; line-height: 20px; width: 20px; height: 20px;
        }

        #map { flex: 1; }

        /* FOOTER Y MENSAJES */
        .info-bar { background: var(--azul-oscuro); color: white; padding: 10px; font-size: 0.8rem; display: flex; justify-content: space-between; }
        .msg-interact { background: white; padding: 10px; border-top: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<!-- 1. CUADRO DE DIALOGO INICIAL -->
<div id="modal-registro">
    <div class="form-registro">
        <img src="img/logo2.jpeg" alt="Logo MyBus" style="width: 120px; margin-bottom: 15px;">
        <h2>Bienvenido</h2>
        <p>Ingresa tus datos para continuar</p>
        <input type="tel" id="input-phone" placeholder="Número de Teléfono" style="width:100%; padding:10px; margin-bottom:15px;">
        <button class="btn-main btn-auto" onclick="validarYActivar()">PERMITIR GPS Y ACTIVAR</button>
    </div>
</div>

<!-- 2. INTERFAZ PRINCIPAL -->
<aside class="sidebar">
    <div class="sidebar-content">
        <div class="section-box">
            <h3>Búsqueda Automática</h3>
            <button class="btn-main btn-auto" onclick="activarTriangulacionAuto()">DETECTAR PARADA MÁS CERCANA</button>
        </div>

        <div class="section-box">
            <h3>Búsqueda Manual</h3>
            <div id="search-container" style="border: 1px solid var(--celeste); border-radius: 4px;"></div>
            <div id="manual-info" style="margin-top:10px; font-size:0.85rem;"></div>
        </div>

        <div class="section-box" style="background: #eef7ff;">
            <h3>Buses Cercanos (Top 3)</h3>
            <div id="top-buses">Esperando ubicación...</div>
        </div>
    </div>

    <div class="info-bar">
        <span>☁️ Clima: 29°C</span>
        <span>⚠️ Sin Accidentes</span>
    </div>
    <div class="msg-interact">
        <span style="color: var(--azul-deep); font-weight:bold;">Mensajes: Activo</span>
        <a href="#" style="color: #25D366; font-weight:bold; text-decoration:none;">WhatsApp 💬</a>
    </div>
</aside>

<main id="map"></main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.2/dist/leaflet-search.min.js"></script>

<!-- Carga dinámica del archivo de paradas -->
<script src="PUNTOS_MANAGUA_01052026_1.js"></script>

<script>
    var map = L.map('map').setView([12.1328, -86.2504], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var userMarker, busMarker, polyline;
    var userPos = null;

    // Símbolo de Usuario (Forma Norte, Color Rojo)
    var userIcon = L.divIcon({
        className: 'user-north-icon',
        html: '<div style="color:red; font-size:24px; transform: rotate(-45deg);">▲</div>',
        iconSize: [20, 20]
    });

    function validarYActivar() {
        let tel = document.getElementById('input-phone').value;
        if(tel.length < 8) return alert("Ingrese un teléfono válido");
        
        document.getElementById('modal-registro').style.display = 'none';
        iniciarGPS();
    }

    function iniciarGPS() {
        navigator.geolocation.getCurrentPosition(pos => {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            if(userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(userPos, {icon: userIcon}).addTo(map).bindPopup("Mi Ubicación (Norte)");
            map.setView(userPos, 16);
        });
    }

    // Dibujar Paradas con su número en círculo
    var stopsLayer = L.geoJSON(PUNTOS_MANAGUA_01052026_1, {
        pointToLayer: function(feature, latlng) {
            let num = feature.properties.NUM_PARADA || "P";
            return L.marker(latlng, {
                icon: L.divIcon({
                    className: 'stop-icon-label',
                    html: `<div>${num}</div>`
                })
            });
        }
    }).addTo(map);

    // Buscador Manual (Para escribir parada)
    var searchControl = new L.Control.Search({
        container: 'search-container',
        layer: stopsLayer,
        propertyName: 'name',
        marker: false,
        moveToLocation: function(latlng, title) {
            triangular(latlng, title);
        }
    });
    map.addControl(searchControl);

    function triangular(targetLatlng, nombreParada) {
        if(!userPos) return alert("Active su GPS primero");

        // Limpiar líneas anteriores
        if(polyline) map.removeLayer(polyline);

        // Línea descontinua: Usuario -> Parada
        polyline = L.polyline([userPos, targetLatlng], {
            color: 'blue', dashArray: '10, 10', weight: 2
        }).addTo(map);

        let dist = (map.distance(userPos, targetLatlng) / 1000).toFixed(2);
        document.getElementById('manual-info').innerHTML = `
            <b>Parada:</b> ${nombreParada}<br>
            <b>Distancia:</b> ${dist} km<br>
            <b>Tiempo est.:</b> ${Math.round(dist * 12)} min
        `;
        map.fitBounds(polyline.getBounds());
    }

    function activarTriangulacionAuto() {
        // Aquí buscaríamos la parada más cercana automáticamente
        // y llenaríamos el cuadro de "Top 3 buses"
        document.getElementById('top-buses').innerHTML = `
            <p>1. Bus 102 - 4 min</p>
            <p>2. Bus 110 - 7 min</p>
            <p>3. Bus 120 - 12 min</p>
        `;
    }
</script>

</body>
</html>
