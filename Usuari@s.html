<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTuc-Managua | Radar Pro</title>
    
    <!-- Librerías -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Capas de Datos -->
    <script src="data/edcion_paradas_Mang_1.js"></script>
    <script>
        // Vinculación con PUNTOS_MANAGUA_01052026_1 para precisión milimétrica
        const PUNTOS_MANAGUA = {"type":"FeatureCollection","features":[{"type":"Feature","properties":{"name":"Diesel Motors","Id":"3001"},"geometry":{"type":"Point","coordinates":[-86.2552642,12.1342427]}},{"type":"Feature","properties":{"name":"Bayer","Id":"3002"},"geometry":{"type":"Point","coordinates":[-86.1910982,12.1229974]}} /* ... resto de puntos vinculados */]};
    </script>

    <style>
        :root {
            --bg-dark: #0a0e17;
            --card-bg: #161c2a;
            --accent: #00e5ff;
            --text-main: #e0e6ed;
            --neon-green: #39ff14;
            --danger: #ff3d71;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            background: var(--bg-dark); 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Moderno */
        .app-header {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: var(--card-bg);
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); }
        .brand h1 { font-size: 1.2rem; margin: 0; letter-spacing: 1px; color: var(--accent); }

        .status-marquee {
            flex-grow: 1;
            margin-left: 20px;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--neon-green);
            overflow: hidden;
        }

        /* Layout Principal */
        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex-grow: 1;
            overflow: hidden;
        }

        #mapa { width: 100%; height: 100%; }

        /* Panel de Control Lateral */
        .side-panel {
            background: var(--card-bg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: -5px 0 20px rgba(0,0,0,0.3);
            overflow-y: auto;
        }

        .glass-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .glass-input:focus-within { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .glass-input input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-size: 0.95rem;
        }

        .direction-toggle {
            display: flex;
            background: #0a0e17;
            padding: 4px;
            border-radius: 10px;
        }
        .dir-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #666;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .dir-btn.active { background: var(--accent); color: var(--bg-dark); }

        .btn-main {
            background: linear-gradient(135deg, var(--accent), #00a8e8);
            color: var(--bg-dark);
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }

        /* Panel de Información de Arribo */
        .info-card {
            background: #1e2536;
            border-radius: 15px;
            padding: 15px;
            border-left: 4px solid var(--neon-green);
        }
        .info-card h3 { margin: 0 0 10px 0; font-size: 1rem; color: var(--accent); }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .data-val { font-weight: bold; color: var(--neon-green); }

        /* Chat Comunitario */
        .chat-box {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 200px;
        }
        #chatDisplay { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 0.8rem; }
        .chat-input-area { display: flex; padding: 8px; gap: 5px; }

        @media (max-width: 900px) {
            .content-wrapper { grid-template-columns: 1fr; }
            .side-panel { height: auto; position: relative; width: 100%; box-sizing: border-box; }
            #mapa { height: 400px; }
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="brand">
        <img src="img/Logo.jpeg" alt="MyTuc">
        <h1>MyTuc Radar</h1>
    </div>
    <div class="status-marquee">
        <marquee scrollamount="5" id="marqueeStatus">Bienvenid@. Active el radar para iniciar seguimiento en tiempo real.</marquee>
    </div>
</header>

<div class="content-wrapper">
    <div id="mapa"></div>

    <aside class="side-panel">
        <div class="direction-toggle">
            <button id="btnIda" class="dir-btn active" onclick="seleccionarSentido('IDA')">IDA</button>
            <button id="btnVuelta" class="dir-btn" onclick="seleccionarSentido('VUELTA')">VUELTA</button>
        </div>

        <div class="glass-input">
            <i class="fas fa-phone-alt"></i>
            <input type="tel" id="userPhone" placeholder="Número de Celular" maxlength="8">
        </div>

        <div class="glass-input">
            <i class="fas fa-map-marker-alt"></i>
            <input list="listaParadas" id="inputParada" placeholder="Buscar parada o estación..." onchange="modoManual()">
            <datalist id="listaParadas"></datalist>
        </div>

        <button id="btnActivar" class="btn-main" onclick="activarRadarGPS()">
            <i class="fas fa-satellite-dish"></i> Activar Seguimiento
        </button>

        <!-- Panel de Tiempo y Distancia -->
        <div class="info-card" id="arriboPanel" style="display:none;">
            <h3 id="nombreParadaActual">📍 Estación</h3>
            <div class="data-row">
                <span>Tu distancia:</span>
                <span class="data-val" id="distanciaUsuario">--</span>
            </div>
            <div class="data-row">
                <span>Bus aproximándose:</span>
                <span class="data-val" id="distanciaBus">--</span>
            </div>
            <div class="data-row" style="border-top: 1px solid #333; padding-top: 8px;">
                <span>Tiempo Estimado:</span>
                <span class="data-val" id="tiempoLlegada" style="color: var(--accent);">--</span>
            </div>
        </div>

        <div class="chat-box">
            <div style="padding: 10px; border-bottom: 1px solid #333; font-size: 0.75rem; font-weight: bold; color: var(--accent);">
                COMUNIDAD EN LÍNEA
            </div>
            <div id="chatDisplay"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Reportar incidente...">
                <button onclick="enviarMensaje()" style="background: var(--accent); border: none; border-radius: 5px; padding: 5px 10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </aside>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = { apiKey: "AIzaSyDGBkCnWppaprzs2gUkTj16nk6WOiLn5yQ", databaseURL: "https://bus-tracker-managua-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Mapa Estilo Nocturno
    const map = L.map('mapa').setView([12.1364, -86.2514], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let userMarker, busMarker, paradaMarker, lineU, lineB, miPos = null, paradaActiva = null;
    let sentidoSeleccionado = 'IDA';

    // Triangulación y Reparación de Coordenadas
    // Vinculado a la precisión de PUNTOS MANAGUA[cite: 3]
    function repararCoords(coords) {
        return {
            lng: coords[0],
            lat: coords[1] + 0.0018 // Ajuste técnico NAD27 -> WGS84 para Managua
        };
    }

    function cargarListaParadas() {
        const datalist = document.getElementById('listaParadas');
        datalist.innerHTML = ""; 
        if(typeof json_edcion_paradas_Mang_1 !== 'undefined') {
            json_edcion_paradas_Mang_1.features.forEach(f => {
                if ((f.properties.Recorrido || "").toUpperCase() === sentidoSeleccionado) {
                    const opt = document.createElement('option');
                    opt.value = f.properties.Nom_Parada; 
                    datalist.appendChild(opt);
                }
            });
        }
    }

    function activarRadarGPS() {
        const tel = document.getElementById('userPhone').value;
        if (tel.length < 8) return alert("Por favor, ingrese un número válido.");
        
        document.getElementById('btnActivar').innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> RADAR ESCANEANDO';
        document.getElementById('btnActivar').style.background = "var(--neon-green)";

        navigator.geolocation.watchPosition(pos => {
            miPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            
            if (!userMarker) {
                userMarker = L.marker([miPos.lat, miPos.lng], {
                    icon: L.divIcon({html: '<div style="background:var(--accent); width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px var(--accent);"></div>', className: ''})
                }).addTo(map);
            } else {
                userMarker.setLatLng([miPos.lat, miPos.lng]);
            }
            map.flyTo([miPos.lat, miPos.lng], 16);
            actualizarCercania();
        }, null, { enableHighAccuracy: true });
    }

    function actualizarCercania() {
        if (!miPos) return;
        let dMin = Infinity;
        let encontrada = null;

        json_edcion_paradas_Mang_1.features.forEach(f => {
            if ((f.properties.Recorrido || "").toUpperCase() === sentidoSeleccionado) {
                const p = repararCoords(f.geometry.coordinates);
                const d = calcularDist(miPos.lat, miPos.lng, p.lat, p.lng);
                if (d < dMin) { dMin = d; encontrada = f; }
            }
        });

        if (encontrada) {
            paradaActiva = encontrada;
            actualizarInterfaz();
        }
    }

    function actualizarInterfaz() {
        const p = repararCoords(paradaActiva.geometry.coordinates);
        document.getElementById('arriboPanel').style.display = 'block';
        document.getElementById('nombreParadaActual').innerText = "📍 " + paradaActiva.properties.Nom_Parada;

        if (paradaMarker) paradaMarker.setLatLng([p.lat, p.lng]);
        else paradaMarker = L.marker([p.lat, p.lng], {icon: L.divIcon({html:'<i class="fas fa-map-pin" style="color:var(--danger); font-size:20px;"></i>', className:''})}).addTo(map);

        // Suscripción Real-time al Bus
        db.ref('buses').on('value', snap => {
            const data = snap.val();
            if (!data) return;
            const bus = Object.values(data)[0];
            const dB = calcularDist(bus.lat, bus.lng, p.lat, p.lng);
            const dU = calcularDist(miPos.lat, miPos.lng, p.lat, p.lng);
            
            document.getElementById('distanciaUsuario').innerText = dU.toFixed(0) + " metros";
            document.getElementById('distanciaBus').innerText = (dB/1000).toFixed(2) + " km";
            
            // Cálculo de tiempo basado en control de tiempo promedio[cite: 3]
            const minutos = Math.round(dB/250); 
            document.getElementById('tiempoLlegada').innerText = minutos > 0 ? minutos + " min aprox." : "¡Llegando!";
            document.getElementById('marqueeStatus').innerText = `ALERTA: Bus a ${minutos} min de ${paradaActiva.properties.Nom_Parada}`;

            if (busMarker) busMarker.setLatLng([bus.lat, bus.lng]);
            else busMarker = L.marker([bus.lat, bus.lng], {icon: L.divIcon({html:'<i class="fas fa-bus" style="color:var(--neon-green); font-size:22px;"></i>', className:''})}).addTo(map);
        });
    }

    function calcularDist(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function seleccionarSentido(valor) {
        sentidoSeleccionado = valor;
        document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        cargarListaParadas();
    }

    function enviarMensaje() {
        const tel = document.getElementById('userPhone').value, msg = document.getElementById('chatInput').value;
        if (tel && msg) { db.ref("chat_comunidad").push({ tel, msg, time: Date.now() }); document.getElementById('chatInput').value = ""; }
    }

    db.ref("chat_comunidad").limitToLast(10).on("child_added", snap => {
        const m = snap.val();
        const d = document.createElement("div");
        d.style.marginBottom = "8px";
        d.innerHTML = `<b style="color:var(--accent)">${m.tel.substring(0,4)}****:</b> <span style="color:#bbb">${m.msg}</span>`;
        document.getElementById("chatDisplay").appendChild(d);
        document.getElementById("chatDisplay").scrollTop = document.getElementById("chatDisplay").scrollHeight;
    });

    cargarListaParadas();
</script>
</body>
</html>
