<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBus - Rastreo en Tiempo Real</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
        :root {
            --panel-bg: rgba(30, 30, 30, 0.95);
            --text-color: #ffffff;
            --accent-color: #00e5ff; /* Cian profesional */
            --border-color: #444;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }

        /* Panel Superior: Información de Ruta */
        .info-top {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--panel-bg);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            display: flex;
            gap: 20px;
            min-width: 300px;
            justify-content: center;
        }

        /* Panel Inferior: Datos de Proximidad */
        .info-bottom {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--panel-bg);
            color: var(--text-color);
            padding: 15px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .data-item {
            display: flex;
            flex-direction: column;
        }

        .data-item i {
            color: var(--accent-color);
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; }
        .value { font-weight: bold; font-size: 1.1rem; }

        /* Estilo para el pulso de proximidad */
        .pulsing-icon {
            border-radius: 50%;
            background: var(--accent-color);
            box-shadow: 0 0 0 rgba(0, 229, 255, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="info-top">
        <div><i class="fas fa-bus"></i> <span id="route-name">Ruta 114</span></div>
        <div id="bus-status" style="color: #4caf50;">En Transito</div>
    </div>

    <div id="map"></div>

    <div class="info-bottom">
        <div class="data-item">
            <i class="fas fa-clock"></i>
            <span class="label">Tiempo</span>
            <span class="value" id="eta">-- min</span>
        </div>
        <div class="data-item">
            <i class="fas fa-route"></i>
            <span class="label">Distancia</span>
            <span class="value" id="distance">-- km</span>
        </div>
        <div class="data-item">
            <i class="fas fa-map-marker-alt"></i>
            <span class="label">Prox. Parada</span>
            <span class="value" id="next-stop">Buscando...</span>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Inicializar mapa (Vista centrada en Managua)
        const map = L.map('map').setView([12.1328, -86.2504], 14);

        // Tile layer CLARO para mejor visibilidad de calles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Iconos personalizados
        const busIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#2196f3; color:white; padding:5px; border-radius:50%; border:2px solid white;'><i class='fas fa-bus'></i></div>",
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        const userIcon = L.divIcon({
            className: 'pulsing-icon',
            html: "<div style='background-color:#00e5ff; width:12px; height:12px; border-radius:50%; border:2px solid white;'></div>",
            iconSize: [12, 12],
            iconAnchor: [6, 6]
        });

        // Capas de dibujo
        let busMarker = L.marker([12.135, -86.255], {icon: busIcon}).addTo(map);
        let userMarker = L.marker([12.130, -86.250], {icon: userIcon}).addTo(map);
        let connectionLine = L.polyline([], {color: '#00e5ff', dashArray: '5, 10', weight: 2}).addTo(map);
        let proximityCircle = L.circle([12.135, -86.255], {radius: 500, color: '#00e5ff', fillOpacity: 0.1, weight: 1}).addTo(map);

        // Datos de paradas (Basado en tus coordenadas[cite: 7])
        const paradas = [
            { id: 3001, name: "Diesel Motors", lat: 12.1450, lng: -86.2300 },
            { id: 3013, name: "Iglesia San José Obrero", lat: 12.1380, lng: -86.2450 }
        ];

        // Función para actualizar la UI
        function updateTracking(busLat, busLng, userLat, userLng) {
            // Actualizar posiciones
            busMarker.setLatLng([busLat, busLng]);
            userMarker.setLatLng([userLat, userLng]);
            proximityCircle.setLatLng([busLat, busLng]);
            connectionLine.setLatLngs([[busLat, busLng], [userLat, userLng]]);

            // Calcular distancia (Haversine simple vía Leaflet)
            const distMeters = map.distance([userLat, userLng], [busLat, busLng]);
            document.getElementById('distance').innerText = (distMeters / 1000).toFixed(2) + " km";
            
            // Estimación de tiempo (Asumiendo 20km/h promedio)
            const timeMin = Math.round((distMeters / 1000) / 20 * 60);
            document.getElementById('eta').innerText = timeMin + " min";

            // Lógica de 500 metros
            if(distMeters <= 500) {
                document.getElementById('next-stop').innerText = "¡Llegando!";
                document.getElementById('next-stop').style.color = "#00e5ff";
            } else {
                document.getElementById('next-stop').innerText = paradas[0].name; // Ejemplo
                document.getElementById('next-stop').style.color = "white";
            }
        }

        // Simulación de movimiento inicial
        updateTracking(12.135, -86.255, 12.130, -86.250);

    </script>
</body>
</html>
