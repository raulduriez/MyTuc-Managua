<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTuc | Acceso Usuarios</title>
    
    <!-- Librerías de Estilo y Mapas -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Scripts Base -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data/edcion_paradas_Mang_1.js"></script>

    <style>
        :root {
            --bg-dark: #070b12;
            --accent: #00e5ff;
            --glow: #7000ff;
            --azul-deep: #004e92;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--azul-deep), var(--bg-dark)) !important;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* --- EFECTO PORTAL (INICIO) --- */
        #portalView {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .portal-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .space-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--accent), var(--glow), transparent);
            animation: spin 1.5s linear infinite;
            filter: drop-shadow(0 0 20px var(--accent));
        }

        .space-ring::after {
            content: '';
            position: absolute;
            inset: 8px;
            background: var(--bg-dark);
            border-radius: 50%;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .logo-central {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            z-index: 10;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* --- MODAL IDENTIFICACIÓN --- */
        .access-card {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111827;
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--accent);
            text-align: center;
            width: 90%;
            max-width: 380px;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.3);
        }

        .input-group-custom {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 12px;
            margin: 25px 0;
            border: 1px solid #333;
        }

        .input-group-custom input {
            background: transparent;
            border: none;
            color: var(--accent);
            width: 100%;
            text-align: center;
            font-size: 1.4rem;
            outline: none;
            letter-spacing: 3px;
        }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 90;
        }

        /* --- INTERFAZ DE RADAR (OCULTA AL INICIO) --- */
        #radarView {
            display: none;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
        }

        #mapa { 
            height: 400px; 
            border-radius: 20px; 
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .arribo-panel {
            background: white;
            color: #111;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- VISTA 1: PORTAL -->
    <div id="portalView">
        <div class="portal-container" onclick="abrirModal()">
            <div class="space-ring"></div>
            <img src="img/Logo.jpeg" class="logo-central" alt="Logo MyTuc">
        </div>
    </div>

    <div id="overlay"></div>

    <!-- MODAL DE IDENTIFICACIÓN -->
    <div id="modalAcceso" class="access-card">
        <h2 class="fw-bold mb-1">IDENTIFICACIÓN</h2>
        <p class="small opacity-50">Rastrea tu ruta en tiempo real</p>
        
        <div class="input-group-custom">
            <input type="tel" id="userPhone" placeholder="88888888" maxlength="8">
        </div>

        <button class="btn btn-info w-100 py-3 fw-bold rounded-4" onclick="iniciarAplicacion()">
            ACTIVAR RADAR
        </button>
    </div>

    <!-- VISTA 2: RADAR Y MAPA -->
    <div id="radarView" class="container-fluid">
        <header class="text-center mb-4">
            <h3 class="fw-bold text-info">MyTuc | Radar en Vivo</h3>
        </header>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="glass-card mb-3">
                    <label class="small opacity-50 mb-2">BUSCAR MI PARADA</label>
                    <input list="listaParadas" id="inputParada" class="form-control bg-dark text-white border-0 py-2" placeholder="Nombre de la parada..." onchange="consultarParadaManual()">
                    <datalist id="listaParadas"></datalist>
                </div>

                <div class="glass-card">
                    <h6 class="small fw-bold mb-3"><i class="fas fa-comments me-2"></i> CHAT COMUNIDAD</h6>
                    <div id="chatDisplay" style="height: 140px; overflow-y: auto; font-size: 0.85rem;" class="mb-2"></div>
                    <div class="input-group">
                        <input type="text" id="chatInput" class="form-control bg-dark text-white border-0" placeholder="Mensaje...">
                        <button onclick="enviarMensaje()" class="btn btn-info"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div id="mapa"></div>
                
                <div id="arriboPanel" class="arribo-panel shadow-lg" style="display:none;">
                    <table class="table table-sm mb-0">
                        <thead class="small"><tr><th>Punto</th><th>Distancia</th><th>Estado</th></tr></thead>
                        <tbody id="tablaBody" class="fw-bold"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyDGBkCnWppaprzs2gUkTj16nk6WOiLn5yQ", databaseURL: "https://bus-tracker-managua-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LÓGICA DE TRANSICIÓN
        function abrirModal() {
            document.getElementById('modalAcceso').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function iniciarAplicacion() {
            const tel = document.getElementById('userPhone').value;
            if(tel.length < 8) return alert("Ingrese un número válido");

            // Ocultar Portal y Mostrar Radar
            document.getElementById('portalView').style.display = 'none';
            document.getElementById('modalAcceso').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('radarView').style.display = 'block';

            // Inicializar Mapa y Datos
            setTimeout(() => {
                map.invalidateSize();
                iniciarRadarAutomatico();
            }, 200);
        }

        // LÓGICA DEL MAPA (Leaflet)
        const map = L.map('mapa', { zoomControl: false }).setView([12.1150, -86.2363], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let userMarker, busMarker, paradaMarker, linePB, miPos = null;
        let paradaSeleccionada = null;

        function cargarListaParadas() {
            const list = document.getElementById('listaParadas');
            if(window.json_edcion_paradas_Mang_1) {
                json_edcion_paradas_Mang_1.features.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f.properties.Nom_Parada;
                    list.appendChild(opt);
                });
            }
        }
        cargarListaParadas();

        function iniciarRadarAutomatico() {
            navigator.geolocation.getCurrentPosition(pos => {
                miPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                let minDist = Infinity;
                json_edcion_paradas_Mang_1.features.forEach(f => {
                    const d = calcularDist(miPos.lat, miPos.lng, f.geometry.coordinates[1], f.geometry.coordinates[0]);
                    if (d < minDist) { minDist = d; paradaSeleccionada = f; }
                });
                document.getElementById('inputParada').value = paradaSeleccionada.properties.Nom_Parada;
                document.getElementById('arriboPanel').style.display = 'block';
                actualizarInterfaz();
            }, null, { enableHighAccuracy: true });
        }

        function actualizarInterfaz() {
            const pLat = paradaSeleccionada.geometry.coordinates[1];
            const pLng = paradaSeleccionada.geometry.coordinates[0];
            
            if(userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker([miPos.lat, miPos.lng], { color: '#00e5ff', radius: 8 }).addTo(map);
            
            if(paradaMarker) map.removeLayer(paradaMarker);
            paradaMarker = L.marker([pLat, pLng]).addTo(map);
            map.setView([pLat, pLng], 15);

            db.ref('buses').on('value', snap => {
                const buses = snap.val();
                if(!buses) return;
                const bus = Object.values(buses)[0];
                const dBP = calcularDist(bus.lat, bus.lng, pLat, pLng);
                
                document.getElementById('tablaBody').innerHTML = `
                    <tr><td>TU POSICIÓN</td><td>${(calcularDist(miPos.lat, miPos.lng, pLat, pLng)*1000).toFixed(0)}m</td><td>En espera</td></tr>
                    <tr class="table-info"><td>BUS PRÓXIMO</td><td>${(dBP*1000).toFixed(0)}m</td><td>${dBP < 0.5 ? 'Llegando' : 'En camino'}</td></tr>`;

                if(busMarker) busMarker.setLatLng([bus.lat, bus.lng]);
                else busMarker = L.marker([bus.lat, bus.lng], { icon: L.divIcon({ html: '<i class="fas fa-bus text-success fa-2x"></i>', className: 'bg-transparent' }) }).addTo(map);
            });
        }

        function calcularDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // CHAT
        function enviarMensaje() {
            const msg = document.getElementById('chatInput').value;
            const tel = document.getElementById('userPhone').value;
            if(!msg) return;
            db.ref("chat_comunidad").push({ perfil: "Usuario", mensaje: msg, telefono: tel, timestamp: Date.now() });
            document.getElementById('chatInput').value = "";
        }

        db.ref("chat_comunidad").limitToLast(10).on("child_added", snap => {
            const m = snap.val();
            const div = document.createElement("div");
            div.innerHTML = `<b style="color:var(--accent)">${m.telefono.slice(-4)}:</b> ${m.mensaje}`;
            document.getElementById("chatDisplay").appendChild(div);
            document.getElementById("chatDisplay").scrollTop = document.getElementById("chatDisplay").scrollHeight;
        });
    </script>
</body>
</html>
