<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBus - Triangulación Real 500m</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.2/dist/leaflet-search.min.css" />
    
    <style>
        :root {
            --azul-oscuro: #000428;
            --azul-deep: #004e92;
            --celeste: #00A8E8;
            --rojo-norte: #FF0000;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f0f2f5; }

        /* MODAL DE REGISTRO */
        #modal-registro {
            position: fixed; inset: 0; background: rgba(0,4,40,0.98);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .form-registro {
            background: white; padding: 40px; border-radius: 20px; width: 380px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* SIDEBAR */
        .sidebar { width: 380px; background: white; display: flex; flex-direction: column; border-right: 1px solid #ddd; z-index: 1000; }
        .sidebar-content { padding: 25px; flex: 1; overflow-y: auto; }

        .section-box { background: #fff; border: 2px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        h3 { font-size: 0.8rem; margin: 0 0 12px 0; color: var(--azul-deep); text-transform: uppercase; letter-spacing: 1px; }

        /* BUSCADOR MANUAL ESTILO MyBus */
        .search-container { background: #eef7ff; padding: 10px; border-radius: 8px; border: 1px solid var(--celeste); min-height: 40px; }

        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-auto { background: var(--azul-oscuro); color: white; margin-bottom: 15px; }

        #map { flex: 1; }

        /* ICONOS */
        .stop-label { background: white; border: 2px solid var(--azul-deep); border-radius: 50%; text-align: center; font-weight: bold; font-size: 11px; line-height: 24px; width: 26px; height: 26px; color: black; }
        
        .info-panel { font-size: 0.9rem; line-height: 1.6; color: #333; }
        .highlight { color: var(--azul-deep); font-weight: bold; }
    </style>
</head>
<body>

<div id="modal-registro">
    <div class="form-registro">
        <img src="img/logo2.jpeg" alt="MyBus" style="width: 150px; margin-bottom: 25px;">
        <h2 style="margin-bottom: 10px;">Acceso al Sistema</h2>
        <p style="color: #666; margin-bottom: 25px;">Ingresa tu teléfono para activar el GPS</p>
        <input type="tel" id="input-phone" placeholder="Ej: 88888888" style="width:100%; padding:15px; border:2px solid #ddd; border-radius:10px; margin-bottom:20px; font-size:1.1rem;">
        <button class="btn-main btn-auto" onclick="autorizarAcceso()">ACTIVAR MI UBICACIÓN</button>
    </div>
</div>

<aside class="sidebar">
    <div class="sidebar-content">
        <div class="section-box">
            <h3>Modo Automático</h3>
            <button class="btn-main btn-auto" onclick="triangularAutomatico()">PARADA MÁS CERCANA (500m)</button>
        </div>

        <div class="section-box">
            <h3>Consulta Manual (Escribir)</h3>
            <div id="buscador-manual" class="search-container"></div>
            <div id="info-manual" class="info-panel" style="margin-top:15px;"></div>
        </div>

        <div class="section-box" style="border-color: var(--celeste);">
            <h3>Buses en Rango Real</h3>
            <div id="lista-buses" class="info-panel">
                <p style="color:#999;">Esperando datos de ubicación...</p>
            </div>
        </div>
    </div>
</aside>

<main id="map"></main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.2/dist/leaflet-search.min.js"></script>
<script src="PUNTOS_MANAGUA_01052026_1.js"></script>

<script>
    var map = L.map('map', {zoomControl: false}).setView([12.1328, -86.2504], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var userMarker, lineaDashed;
    var miUbicacion = null;

    // Icono Flecha Norte Roja
    var iconNorte = L.divIcon({
        className: 'norte-icon',
        html: '<div style="color:red; font-size:35px; transform: rotate(-45deg); text-shadow: 1px 1px 2px #000;">▲</div>',
        iconSize: [30, 30]
    });

    function autorizarAcceso() {
        if(document.getElementById('input-phone').value.length < 8) return alert("Teléfono incompleto");
        document.getElementById('modal-registro').style.display = 'none';
        obtenerGPS();
    }

    function obtenerGPS() {
        navigator.geolocation.watchPosition(pos => {
            miUbicacion = [pos.coords.latitude, pos.coords.longitude];
            if(userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(miUbicacion, {icon: iconNorte}).addTo(map);
            // Solo centra la primera vez para no molestar al usuario si se mueve
            if(!map.hasCentrado) { map.setView(miUbicacion, 16); map.hasCentrado = true; }
        }, err => alert("Error de GPS: " + err.message), {enableHighAccuracy: true});
    }

    // Capa de paradas dinámica
    var capaParadas = L.geoJSON(PUNTOS_MANAGUA_01052026_1, {
        pointToLayer: function(feature, latlng) {
            return L.marker(latlng, {
                icon: L.divIcon({
                    className: 'stop-label',
                    html: `<div>${feature.properties.NUM_PARADA || 'P'}</div>`
                })
            });
        }
    }).addTo(map);

    // BUSCADOR MANUAL - Habilitado para ESCRIBIR
    var controlBuscador = new L.Control.Search({
        container: 'buscador-manual',
        layer: capaParadas,
        propertyName: 'name',
        marker: false,
        initial: false, // Permite buscar en cualquier parte del nombre
        textPlaceholder: 'Escriba nombre de parada...',
        moveToLocation: function(latlng, title) {
            triangular([latlng.lat, latlng.lng], title);
        }
    });
    map.addControl(controlBuscador);

    function triangular(targetCoords, nombre) {
        if(!miUbicacion) return alert("Esperando señal de GPS...");
        
        if(lineaDashed) map.removeLayer(lineaDashed);

        let distancia = map.distance(miUbicacion, targetCoords); // Metros reales
        
        // Dibujar línea descontinua
        lineaDashed = L.polyline([miUbicacion, targetCoords], {
            color: '#004e92', dashArray: '8, 12', weight: 3
        }).addTo(map);

        map.fitBounds(lineaDashed.getBounds(), {padding: [40, 40]});

        // Actualizar datos en tiempo real
        let distKm = (distancia/1000).toFixed(2);
        let tiempo = Math.round(distancia / 80); // Asumiendo caminata a parada

        document.getElementById('info-manual').innerHTML = `
            <div class="highlight">📍 ${nombre}</div>
            Distancia: ${distancia.toFixed(0)} metros<br>
            Tiempo estimado: ${tiempo} min caminando.
        `;

        // Lógica de 500 metros para buses
        if(distancia <= 500) {
            document.getElementById('lista-buses').innerHTML = `
                <p class="highlight" style="color:green;">✓ PARADA EN RANGO (500m)</p>
                <p>1. Bus 101 - 2 min</p>
                <p>2. Bus 114 - 5 min</p>
            `;
        } else {
            document.getElementById('lista-buses').innerHTML = `
                <p style="color:red;">⚠ FUERA DE RANGO (>500m)</p>
                <p>Distancia actual: ${distancia.toFixed(0)}m</p>
            `;
        }
    }

    function triangularAutomatico() {
        if(!miUbicacion) return alert("GPS no activo");

        let paradaCercana = null;
        let dMin = Infinity;

        PUNTOS_MANAGUA_01052026_1.features.forEach(f => {
            let coords = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
            let d = map.distance(miUbicacion, coords);
            if(d < dMin) { dMin = d; paradaCercana = {coords, name: f.properties.name}; }
        });

        if(paradaCercana && dMin <= 500) {
            triangular(paradaCercana.coords, paradaCercana.name);
        } else {
            alert("No hay paradas a menos de 500 metros de tu posición actual.");
        }
    }
</script>

</body>
</html>
