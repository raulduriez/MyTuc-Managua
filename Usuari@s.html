<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTuc | Triangulación Radar</title>
    
    <!-- Librerías -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data/edcion_paradas_Mang_1.js"></script>

    <style>
        :root {
            --bg-dark: #070b12;
            --accent: #00e5ff;
            --glow: #7000ff;
            --azul-deep: #004e92;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--azul-deep), var(--bg-dark)) !important;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* --- ESTILO PORTAL Y LOGIN --- */
        #portalView {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }

        .portal-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .space-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--accent), var(--glow), transparent);
            animation: spin 1.5s linear infinite;
            filter: drop-shadow(0 0 20px var(--accent));
        }

        .space-ring::after {
            content: '';
            position: absolute;
            inset: 8px;
            background: var(--bg-dark);
            border-radius: 50%;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .logo-central {
            width: 190px; height: 190px;
            border-radius: 50%;
            z-index: 10;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .access-card {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111827;
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--accent);
            text-align: center;
            width: 90%;
            max-width: 380px;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.3);
        }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 90;
        }

        /* --- INTERFAZ RADAR --- */
        #radarView { display: none; padding: 20px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
        }

        #mapa { 
            height: 400px; 
            border-radius: 20px; 
            border: 2px solid var(--accent);
        }

        .btn-control {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-rastrear { background: var(--accent); color: #000; }
        .btn-limpiar { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }

        .arribo-panel {
            background: white;
            color: #111;
            border-radius: 20px;
            padding: 20px;
            border-left: 8px solid var(--accent);
        }

        .status-indicator {
            font-size: 0.8rem;
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .online { background: #2ecc7122; color: #2ecc71; border: 1px solid #2ecc71; }
        .offline { background: #e74c3c22; color: #e74c3c; border: 1px solid #e74c3c; }
    </style>
</head>
<body>

    <!-- VISTA PORTAL -->
    <div id="portalView">
        <div class="portal-container" onclick="mostrarLogin()">
            <div class="space-ring"></div>
            <img src="img/Logo.jpeg" class="logo-central" alt="Logo MyTuc">
        </div>
    </div>

    <div id="overlay"></div>

    <!-- MODAL ACCESO -->
    <div id="modalAcceso" class="access-card">
        <h2 class="fw-bold">IDENTIFICACIÓN</h2>
        <p class="small opacity-50">Ingresa tu número para activar el radar</p>
        <input type="tel" id="userPhone" class="form-control bg-dark text-info text-center border-secondary mb-4 py-3 fs-4" placeholder="88888888" maxlength="8">
        <button class="btn btn-info w-100 py-3 fw-bold rounded-4" onclick="entrarARadar()">ACTIVAR RADAR</button>
    </div>

    <!-- VISTA RADAR -->
    <div id="radarView" class="container-fluid">
        <header class="text-center mb-4">
            <h2 class="fw-bold text-info mb-1">MyTuc Radar</h2>
            <div id="busStatus" class="status-indicator offline">Buscando buses...</div>
        </header>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="glass-card mb-3">
                    <label class="small opacity-50 mb-2">BÚSQUEDA MANUAL DE PARADA</label>
                    <input list="listaParadas" id="inputParada" class="form-control bg-dark text-white border-0 py-2 mb-3" placeholder="Nombre de la parada..." onchange="consultarParadaManual()">
                    <datalist id="listaParadas"></datalist>
                    
                    <div class="d-flex gap-2">
                        <button class="btn-control btn-rastrear" onclick="iniciarGPS()"><i class="fas fa-sync-alt"></i> RASTREAR</button>
                        <button class="btn-control btn-limpiar" onclick="limpiar()"><i class="fas fa-eraser"></i> LIMPIAR</button>
                    </div>
                </div>

                <div class="glass-card">
                    <h6 class="small fw-bold mb-3">CHAT COMUNIDAD</h6>
                    <div id="chatDisplay" style="height: 150px; overflow-y: auto;" class="mb-2 small"></div>
                    <div class="input-group">
                        <input type="text" id="chatInput" class="form-control bg-dark text-white border-0" placeholder="Escribe...">
                        <button onclick="enviarMsg()" class="btn btn-info"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div id="mapa"></div>
                
                <!-- PANEL DE ARRIBO TRIANGULADO -->
                <div id="arriboPanel" class="arribo-panel shadow-lg mt-3" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold m-0 text-uppercase text-primary">Triangulación de Arribo</h6>
                        <span id="unidadBadge" class="badge bg-dark">Esperando señal...</span>
                    </div>
                    <table class="table table-sm mb-0">
                        <thead>
                            <tr class="small text-muted text-center">
                                <th>PUNTO REFERENCIA</th>
                                <th>DISTANCIA</th>
                                <th>TIEMPO ESTIMADO</th>
                            </tr>
                        </thead>
                        <tbody id="tablaBody" class="fw-bold text-center"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDGBkCnWppaprzs2gUkTj16nk6WOiLn5yQ", databaseURL: "https://bus-tracker-managua-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('mapa', { zoomControl: false }).setView([12.1150, -86.2363], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let userMarker, busMarker, paradaMarker, linePB, miPos = null, paradaSeleccionada = null;

        if(window.json_edcion_paradas_Mang_1) {
            const list = document.getElementById('listaParadas');
            json_edcion_paradas_Mang_1.features.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.properties.Nom_Parada;
                list.appendChild(opt);
            });
        }

        function mostrarLogin() {
            document.getElementById('modalAcceso').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function entrarARadar() {
            const tel = document.getElementById('userPhone').value;
            if(tel.length < 8) return alert("Ingrese un número válido");
            document.getElementById('portalView').style.display = 'none';
            document.getElementById('modalAcceso').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('radarView').style.display = 'block';
            setTimeout(() => { map.invalidateSize(); iniciarGPS(); }, 300);
        }

        function limpiar() {
            document.getElementById('inputParada').value = "";
            paradaSeleccionada = null;
            if(paradaMarker) map.removeLayer(paradaMarker);
            if(linePB) map.removeLayer(linePB);
            document.getElementById('arriboPanel').style.display = 'none';
            iniciarGPS();
        }

        function iniciarGPS() {
            navigator.geolocation.getCurrentPosition(pos => {
                miPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                if (!paradaSeleccionada) {
                    let minDist = Infinity;
                    json_edcion_paradas_Mang_1.features.forEach(f => {
                        const d = calcularDist(miPos.lat, miPos.lng, f.geometry.coordinates[1], f.geometry.coordinates[0]);
                        if (d < minDist) { minDist = d; paradaSeleccionada = f; }
                    });
                    document.getElementById('inputParada').value = paradaSeleccionada.properties.Nom_Parada;
                }
                document.getElementById('arriboPanel').style.display = 'block';
                actualizarMapa();
                // Forzar actualización de tabla si hay buses
                db.ref('buses').once('value', snap => {
                    if(snap.val()) renderTabla(snap.val());
                });
            }, null, { enableHighAccuracy: true });
        }

        function consultarParadaManual() {
            const val = document.getElementById('inputParada').value;
            const res = json_edcion_paradas_Mang_1.features.find(f => f.properties.Nom_Parada === val);
            if(res) {
                paradaSeleccionada = res;
                document.getElementById('arriboPanel').style.display = 'block';
                actualizarMapa();
                db.ref('buses').once('value', snap => {
                    if(snap.val()) renderTabla(snap.val());
                });
            }
        }

        db.ref('buses').on('value', snap => {
            const buses = snap.val();
            const indicator = document.getElementById('busStatus');
            if(buses && Object.keys(buses).length > 0) {
                indicator.innerHTML = `<i class="fas fa-circle"></i> BUS EN LÍNEA`;
                indicator.className = "status-indicator online";
                if(paradaSeleccionada && miPos) renderTabla(buses);
            } else {
                indicator.innerHTML = `<i class="fas fa-clock"></i> SIN BUSES ACTIVOS`;
                indicator.className = "status-indicator offline";
                document.getElementById('unidadBadge').innerText = "Sin señal de bus";
            }
        });

        function renderTabla(buses) {
            const busId = Object.keys(buses)[0];
            const bus = buses[busId];
            const pLat = paradaSeleccionada.geometry.coordinates[1];
            const pLng = paradaSeleccionada.geometry.coordinates[0];
            
            // Triangulación de distancias
            const distBusAParada = calcularDist(bus.lat, bus.lng, pLat, pLng);
            const distUsuarioAParada = calcularDist(miPos.lat, miPos.lng, pLat, pLng);

            // Tiempos estimados (Basado en velocidad promedio 20km/h para bus y 5km/h para usuario)
            const tiempoBus = Math.round(distBusAParada * 3); // ~3 min por km
            const tiempoUser = Math.round(distUsuarioAParada * 12); // ~12 min por km

            document.getElementById('unidadBadge').innerText = "Rastreando Unidad: " + busId;
            document.getElementById('tablaBody').innerHTML = `
                <tr>
                    <td class="text-start">📍 TU UBICACIÓN</td>
                    <td>${(distUsuarioAParada*1000).toFixed(0)}m</td>
                    <td class="text-info">${distUsuarioAParada < 0.05 ? 'EN PARADA' : tiempoUser + ' min'}</td>
                </tr>
                <tr class="table-info">
                    <td class="text-start">🚌 BUS PRÓXIMO</td>
                    <td>${(distBusAParada*1000).toFixed(0)}m</td>
                    <td class="text-success">${distBusAParada < 0.3 ? 'LLEGANDO' : tiempoBus + ' min'}</td>
                </tr>
                <tr style="background: #f8f9fa; font-size: 0.8rem;">
                    <td colspan="3" class="text-muted">
                        <i class="fas fa-info-circle"></i> Bus a ${(calcularDist(bus.lat, bus.lng, miPos.lat, miPos.lng)*1000).toFixed(0)}m de ti
                    </td>
                </tr>`;

            if(busMarker) busMarker.setLatLng([bus.lat, bus.lng]);
            else busMarker = L.marker([bus.lat, bus.lng], {icon: L.divIcon({html: '<i class="fas fa-bus text-success fa-2x"></i>', className: 'bg-transparent'})}).addTo(map);
            
            if(linePB) map.removeLayer(linePB);
            linePB = L.polyline([[bus.lat, bus.lng], [pLat, pLng]], {color: '#2ECC71', weight: 4, dashArray: '10, 10'}).addTo(map);
        }

        function actualizarMapa() {
            const pLat = paradaSeleccionada.geometry.coordinates[1];
            const pLng = paradaSeleccionada.geometry.coordinates[0];
            if(userMarker) userMarker.setLatLng([miPos.lat, miPos.lng]);
            else userMarker = L.circleMarker([miPos.lat, miPos.lng], { color: '#00e5ff', radius: 8 }).addTo(map);
            if(paradaMarker) paradaMarker.setLatLng([pLat, pLng]);
            else paradaMarker = L.marker([pLat, pLng]).addTo(map);
            map.setView([pLat, pLng], 15);
        }

        function calcularDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function enviarMsg() {
            const m = document.getElementById('chatInput').value;
            const t = document.getElementById('userPhone').value;
            if(m) { db.ref("chat_comunidad").push({ mensaje: m, telefono: t, timestamp: Date.now() }); document.getElementById('chatInput').value = ""; }
        }

        db.ref("chat_comunidad").limitToLast(10).on("child_added", snap => {
            const d = snap.val();
            const div = document.createElement("div");
            div.innerHTML = `<b class="text-info">${d.telefono.slice(-4)}:</b> ${d.mensaje}`;
            document.getElementById('chatDisplay').appendChild(div);
            document.getElementById('chatDisplay').scrollTop = document.getElementById('chatDisplay').scrollHeight;
        });
    </script>
</body>
</html>
