<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBus - Sistema de Gestión de Paradas</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Search CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.2/dist/leaflet-search.min.css" />
    
    <style>
        /* Estilo Original (Claro y Profesional) */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }

        /* Panel Lateral */
        .sidebar {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            width: 320px;
            border: 1px solid #ddd;
        }

        /* Logo MyBus */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
        }

        h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
            text-align: center;
        }

        .filter-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 10px;
            background: #fff;
            border: 1px solid #ccc;
            color: #333;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* Ajuste del buscador Leaflet para que combine */
        .leaflet-control-search {
            box-shadow: 0 1px 5px rgba(0,0,0,0.2) !important;
            border-radius: 5px !important;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <!-- Contenedor del Logo -->
        <div class="logo-container">
            <!-- Reemplaza 'logo_mybus.png' con la ruta real de tu imagen -->
            <img src="logo_mybus.png" alt="MyBus Logo">
        </div>

        <h2>Buscador de Paradas</h2>
        
        <!-- El buscador de Leaflet aparecerá aquí mediante JS o como control -->
        <div class="filter-group">
            <label>Filtrar por Punto de Control</label>
            <select id="select-control">
                <option value="all">Ver todas las paradas</option>
                <option value="01">Punto de Control 01</option>
                <option value="02">Punto de Control 02</option>
            </select>
        </div>
    </div>

    <div id="map"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-search@3.0.2/dist/leaflet-search.min.js"></script>
    
    <!-- Archivo de datos cargado previamente -->
    <!-- <script src="PUNTOS_MANAGUA_01052026_1.js"></script> -->

    <script>
        // Inicializar Mapa
        var map = L.map('map').setView([12.1328, -86.2504], 13);

        // Capa base estándar (OpenStreetMap) - Estilo anterior
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Datos de ejemplo (usa tu variable PUNTOS_MANAGUA_01052026_1)
        var paradasData = {
            "type": "FeatureCollection",
            "features": [
                {
                    "type": "Feature",
                    "properties": { "name": "Parada Central", "NUM_PARADA": "P-001", "PTO_CONTRO": "01" },
                    "geometry": { "type": "Point", "coordinates": [-86.2504, 12.1328] }
                },
                {
                    "type": "Feature",
                    "properties": { "name": "Plaza Inter", "NUM_PARADA": "P-002", "PTO_CONTRO": "02" },
                    "geometry": { "type": "Point", "coordinates": [-86.2704, 12.1428] }
                }
            ]
        };

        // Estilo de los puntos
        var stopsLayer = L.geoJSON(paradasData, {
            onEachFeature: function (feature, layer) {
                layer.bindPopup("<b>" + feature.properties.name + "</b><br>ID: " + feature.properties.NUM_PARADA);
            },
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, {
                    radius: 9,
                    fillColor: "#3498db", // Azul estándar MyBus
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                });
            }
        }).addTo(map);

        // Configuración del buscador
        var searchControl = new L.Control.Search({
            layer: stopsLayer,
            propertyName: 'name',
            initial: false,
            zoom: 16,
            marker: false,
            textPlaceholder: 'Buscar parada...'
        });

        searchControl.on('search:locationfound', function(e) {
            e.layer.openPopup();
        });

        map.addControl(searchControl);

        // Filtrado dinámico
        document.getElementById('select-control').addEventListener('change', function(e) {
            var val = e.target.value;
            stopsLayer.eachLayer(function(layer) {
                if (val === "all" || layer.feature.properties.PTO_CONTRO === val) {
                    map.addLayer(layer);
                } else {
                    map.removeLayer(layer);
                }
            });
        });
    </script>
</body>
</html>
